<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Fahrzeugübersicht RHPD</title>

<style>
body { margin: 0; font-family: "Segoe UI", Arial, sans-serif; background: transparent; color: #fff; }

.container {
max-width: 1800px;
margin: 50px auto;
padding: 20px;
}

.title {
text-align: center;
font-size: 36px;
letter-spacing: 3px;
margin-bottom: 40px;
position: relative;
}

.title::after {
content: "";
width: 120px;
height: 2px;
background: #4aa3ff;
display: block;
margin: 15px auto 0;
}

.grid {
display: grid;
grid-template-columns: repeat(4, 400px);
gap: 30px;
justify-content: center;
}

.card {
width: 400px;
height: 342px;
background: linear-gradient(180deg, #142c46, #0e2136);
border-radius: 14px;
overflow: hidden;
border: 2px solid transparent;
box-shadow: 0 15px 30px rgba(0,0,0,0.4);
transition: transform 0.3s ease, box-shadow 0.3s ease;
}

.card:hover {
transform: translateY(-8px);
animation: policeBorder 0.8s infinite alternate;
}

.card img {
width: 100%;
height: 250px;
object-fit: cover;
}

.card-content {
padding: 10px;
text-align: center;
display: flex;
flex-direction: column;
}

.card-title {
font-size: 18px;
font-weight: 600;
margin-bottom: 2px;
}

.card-subtitle {
font-size: 14px;
color: #9cc9ff;
}

.card-description {
color: #cccccc;
margin-top: 2px;
overflow: hidden;
text-overflow: ellipsis;
display: -webkit-box;
-webkit-line-clamp: 2;
-webkit-box-orient: vertical;
white-space: normal;
}

footer {
text-align: center;
margin: 50px 0 20px;
font-size: 13px;
opacity: 0.6;
}

@keyframes policeBorder {
0% { border-color: #1e90ff; box-shadow:0 0 10px rgba(30,144,255,0.8);}
100% { border-color: #ff3b3b; box-shadow:0 0 10px rgba(255,59,59,0.8);}
}
</style>

</head>

<body>

<div id="vehiclesContainer"></div>

<footer>© 2026 Hashikeks#0</footer>

<script>

const GITHUB_USER = "Hashikeks";
const GITHUB_REPO = "Fahrzeuge-RHPD";
const GITHUB_BRANCH = "main";
const VEHICLES_FILE = "vehiclesData.json";

let vehiclesData = {};

function renderVehicles() {

const container = document.getElementById("vehiclesContainer");
container.innerHTML = "";

for (const cat in vehiclesData) {

if (!vehiclesData[cat] || vehiclesData[cat].length === 0) continue;

const section = document.createElement("div");
section.classList.add("container");

const title = document.createElement("div");
title.classList.add("title");
title.textContent = `— ${cat} —`;

section.appendChild(title);

const grid = document.createElement("div");
grid.classList.add("grid");

vehiclesData[cat].forEach(v => {

const card = document.createElement("div");
card.classList.add("card");

card.innerHTML = `
<img src="${v.img}">
<div class="card-content">
<div class="card-title">${v.name}</div>
<div class="card-subtitle">${v.year}</div>
${v.description ? `<div class="card-description">${v.description}</div>` : ""}
</div>
`;

grid.appendChild(card);

});

section.appendChild(grid);
container.appendChild(section);

}

}

async function loadVehicles() {

try {

const res = await fetch(`https://raw.githubusercontent.com/${GITHUB_USER}/${GITHUB_REPO}/${GITHUB_BRANCH}/${VEHICLES_FILE}`);

vehiclesData = await res.json();

renderVehicles();

} catch (error) {

console.error("Fehler beim Laden der Fahrzeuge:", error);

}

}

loadVehicles();

</script>

</body>
</html>
